<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="道玄文集 - 古典诗词与散文杂记">
    <meta property="og:title" content="道玄文集">
    <meta property="og:description" content="古典诗词与散文杂记">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'  viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>道玄文集</title>
    <!-- 百度统计 -->
    <script async src="https://hm.baidu.com/hm.js?35b5524e050763995511f80570ae121c"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 左侧目录 -->
    <aside class="sidebar">
        <div class="author-link">
            <a href="jianjie.html" class="author-copyright-link" target="_blank" rel="noopener noreferrer">
                📝 关于作者版权
            </a>
        </div>
        
        <h2>文章目录</h2>
        
        <div class="filter-container">
            <select class="filter-select" id="categoryFilter" onchange="filterArticles()">
                <option value="all">全部</option>
                <option value="诗">诗</option>
                <option value="词">词</option>
                <option value="散文">散文</option>
                <option value="其它">其它</option>
            </select>
        </div>
        
        <ul class="article-list" id="articleList">
            <li><div class="loading">📖 加载文章中...</div></li>
        </ul>
    </aside>
    
    <!-- 移动端侧边栏切换按钮 -->
    <div class="sidebar-toggle" onclick="toggleSidebar()">
        <span id="sidebar-icon">☰</span>
    </div>
    
    <!-- 右侧文章区 -->
    <main class="content" id="articleContent">
        <header class="collection-header">
            <h1 lang="zh">道玄文集</h1>
            
            <!-- 页面导航 -->
            <nav class="page-navigation" id="mainNav">
                <a href="index.html" class="page-link">扉页</a>
                <a href="https://mp.weixin.qq.com/mp/appmsgalbum?__biz=Mzk0ODc1MzcxMg==&action=getalbum&album_id=4070727578921992197#wechat_redirect" class="page-link" target="_blank" rel="noopener noreferrer">微信公众号</a>
                <a href="search.html" class="page-link">全文搜索</a>
                <a href="txt2json.html" class="page-link">文本工具</a>
            </nav>
            
            <div role="search" class="search-bar">
                <input type="search" id="searchInput" placeholder="输入关键词搜索..." aria-label="搜索文章">
                <button onclick="searchArticles()">搜索</button>
            </div>
        </header>
        
        <!-- 移动端标签页导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('catalog')">目录</button>
            <button class="tab-btn" onclick="switchTab('article')">文章</button>
        </div>
        
        <div class="tab-content active" id="catalogTab"></div>
        
        <div class="tab-content" id="articleTab">
            <nav class="article-nav">
                <a href="#" id="prevArticle">← 上一篇</a>
                <a href="#" id="nextArticle">下一篇 →</a>
            </nav>
            
            <article>
                <h1 class="article-title" id="articleTitle">欢迎来到道玄文集</h1>
                <div class="article-meta" id="articleMeta">
                    <span>请从左侧选择文章</span>
                </div>
                <div class="article-content" id="articleText">
                    <p>请等待加载...</p>
                </div>
            </article>
            
            <nav class="article-nav">
                <a href="#" id="prevArticleBottom">← 上一篇</a>
                <a href="#" id="nextArticleBottom">下一篇 →</a>
            </nav>
        </div>
    </main>
    
    <!-- 移动端底部悬浮导航 -->
    <div class="article-float-nav">
        <a href="#" id="mobilePrevArticle">← 上一篇</a>
        <a href="#" id="mobileNextArticle">下一篇 →</a>
    </div>
    
    <!-- 前端逻辑已抽离为独立文件 -->
    <script src="app.js"></script>
</body>
</html>
