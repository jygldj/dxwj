<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全文搜索 - 道玄文集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"楷体","宋体",serif;background:#FFFEFC;color:#5A4A3F;padding:12px;line-height:1.8;-webkit-tap-highlight-color:transparent}
.container{max-width:1400px;margin:0 auto;background:#FFFEFC;border-radius:12px;padding:16px;border:1px solid #D1D9D9;min-height:calc(100vh - 24px);display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:2px solid #D1D9D9;margin-bottom:12px}
.header h1{font-size:1.5em;color:#3A6351;font-weight:normal;letter-spacing:2px}
.header h1 span{font-size:0.6em;color:#7A8B7B}
.back-link{color:#3A6351;padding:4px 12px;border:1px solid #C7D8D2;border-radius:20px;text-decoration:none;font-size:0.9em}
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-bar input{flex:1;padding:8px 14px;border:2px solid #D1D9D9;border-radius:30px;font-family:"楷体",serif;font-size:16px;outline:none;background:#fff}
.search-bar input:focus{border-color:#3A6351}
.search-bar button{padding:8px 20px;background:#3A6351;color:#fff;border:none;border-radius:30px;cursor:pointer;font-family:"楷体",serif;font-size:16px}
#stats{font-size:0.9em;color:#7A8B7B;margin-bottom:8px;display:none}
.main-panels{display:flex;flex:1;gap:12px;min-height:0}
.left-panel{width:35%;min-width:200px;overflow-y:auto;padding-right:8px;border-right:1px solid #E8EDEA}
.right-panel{flex:1;overflow-y:auto;padding-left:4px}
.result-item{padding:10px;margin-bottom:4px;border-radius:6px;cursor:pointer;border-left:3px solid transparent;background:rgba(255,255,255,0.5)}
.result-item:hover,.result-item.active{background:#E8F1EC;border-left-color:#3A6351}
.result-item .t{color:#3A6351;font-weight:bold;display:block}
.result-item .m{font-size:0.8em;color:#7A8B7B;display:flex;gap:10px}
.result-item .s{font-size:0.85em;color:#8A9B8B;margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.highlight{background:#F0E6C5;padding:0 2px;border-radius:2px}
.loading{text-align:center;padding:30px;color:#A8A59B}
.empty{text-align:center;padding:30px;color:#7A8B7B;width:100%}
.empty .icon{font-size:3em;margin-bottom:8px;opacity:0.5}
@media(max-width:820px){
.main-panels{flex-direction:column}
.left-panel{width:100%;border-right:none;border-bottom:1px solid #E8EDEA;padding-bottom:8px;max-height:35vh}
.right-panel{min-height:50vh}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔍 全文搜索 <span>· 道玄文集</span></h1>
<a href="index1.html" class="back-link">← 返回</a>
</div>
<div class="search-bar">
<input type="text" id="q" placeholder="输入关键词搜索全部文章..." autofocus>
<button onclick="doSearch()">搜索</button>
</div>
<div id="stats">共找到 <strong id="count">0</strong> 篇相关文章</div>
<div class="main-panels">
<div class="left-panel" id="left"><div class="loading" id="msg">📖 正在连接知识库...</div></div>
<div class="right-panel" id="right"><div class="empty"><div class="icon">📄</div><p>输入关键词搜索文章</p></div></div>
</div></div>
<script>
// 道玄文集 - 全文搜索（大师修复版 v2.0）
var allArticles = [];
var currentResults = [];
var currentIdx = -1;
var loaded = false;
var basePath = ''; // 动态基础路径
// 智能路径探测
function detectBasePath() {
    var path = window.location.pathname;
    // 如果在 dist 目录下，或者路径包含 dist，则使用 dist/
    if (path.includes('/dist/') || path.endsWith('/dist')) {
        return './';
    }
    // 默认尝试 dist 目录，因为构建产物通常在这里
    return 'dist/';
}
// 带重试的稳健 fetch
async function get(url) {
    var last = null;
    for (var i = 0; i < 3; i++) {
        try {
            // 添加时间戳防止缓存，手机端缓存问题严重
            var r = await fetch(basePath + url + '?t=' + Date.now());
            if (r.ok) return r;
        } catch(e) { 
            last = e; 
            console.warn('Attempt ' + (i+1) + ' failed for ' + url);
        }
        if (i < 2) await new Promise(function(r) { setTimeout(r, 800); });
    }
    throw last || new Error('加载失败');
}
// 初始化
document.addEventListener('DOMContentLoaded', async function() {
    basePath = detectBasePath();
    console.log('Base path detected:', basePath);
    
    try {
        document.getElementById('msg').innerHTML = '🔄 正在加载文章索引...';
        var resp = await get('articles-index.json');
        var idx = await resp.json();
        
        allArticles = [];
        var total = Math.ceil(idx.length / 50);
        document.getElementById('msg').innerHTML = '📚 索引已获取，正在分卷加载 (' + total + '卷)...';
        
        for (var v = 1; v <= total; v++) {
            document.getElementById('msg').innerHTML = '⏳ 加载第 ' + v + '/' + total + ' 卷...';
            var vr = await get('articles_v' + v + '.json');
            var vd = await vr.json();
            for (var i = 0; i < vd.length; i++) {
                var a = vd[i];
                // 安全提取纯文本用于搜索
                var div = document.createElement('div');
                div.innerHTML = a.content;
                a.raw = div.textContent || div.innerText || '';
                allArticles.push(a);
            }
        }
        
        // 分类统计
        var stats = {'诗':0,'词':0,'散文':0,'其它':0};
        for (var i = 0; i < allArticles.length; i++) {
            var c = allArticles[i].category;
            if (stats[c] !== undefined) stats[c]++; else stats['其它']++;
        }
        
        document.getElementById('msg').innerHTML =
            '✅ 就绪！共 ' + allArticles.length + ' 篇文章<br>' +
            '<small style="color:#7A8B7B">诗 ' + stats['诗'] + ' · 词 ' + stats['词'] + ' · 散文 ' + stats['散文'] + ' · 其他 ' + stats['其它'] + '</small>';
        loaded = true;
        
        // 支持 URL 参数搜索
        var p = new URLSearchParams(window.location.search);
        var q = p.get('q');
        if (q) { document.getElementById('q').value = q; doSearch(); }
        
    } catch(e) {
        console.error(e);
        document.getElementById('msg').innerHTML =
            '😅 连接知识库失败<br><small>请检查网络或刷新页面重试</small><br><small style="color:#e74c3c">' + e.message + '</small>';
    }
    
    // 回车搜索
    document.getElementById('q').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
    });
});
// 搜索逻辑
function doSearch() {
    var kw = document.getElementById('q').value.trim();
    var left = document.getElementById('left');
    var right = document.getElementById('right');
    
    if (!kw) {
        left.innerHTML = '<div class="empty"><div class="icon">📖</div><p>输入关键词搜索全部文章</p></div>';
        right.innerHTML = '<div class="empty"><div class="icon">📄</div><p>输入关键词搜索文章</p></div>';
        document.getElementById('stats').style.display = 'none';
        return;
    }
    
    if (!loaded) {
        left.innerHTML = '<div class="loading">🔍 文章索引正在加载，请稍后再搜...</div>';
        return;
    }
    
    left.innerHTML = '<div class="loading">🔍 正在全库检索...</div>';
    document.getElementById('stats').style.display = 'none';
    // 使用 setTimeout 让 UI 有机会渲染 loading 状态
    setTimeout(function() {
        var lk = kw.toLowerCase();
        currentResults = [];
        
        for (var i = 0; i < allArticles.length; i++) {
            var a = allArticles[i];
            // 在标题、分类、日期和正文中搜索
            var txt = (a.title + ' ' + a.category + ' ' + a.date + ' ' + a.raw).toLowerCase();
            if (txt.indexOf(lk) > -1) currentResults.push(a);
        }
        
        document.getElementById('stats').style.display = 'block';
        document.getElementById('count').textContent = currentResults.length;
        var html = '';
        for (var i = 0; i < currentResults.length; i++) {
            var a = currentResults[i];
            var snippet = getSnippet(a.raw, lk);
            html += '<div class="result-item" onclick="showPreview(' + i + ')">' +
                '<span class="t">' + hl(a.title, lk) + '</span>' +
                '<div class="m"><span>#' + a.id + '</span><span>' + a.category + '</span><span>' + a.date + '</span></div>' +
                '<div class="s">' + snippet + '</div>' +
                '</div>';
        }
        
        left.innerHTML = html || '<div class="empty"><div class="icon">🔍</div><p>未找到包含 "<b>' + kw + '</b>" 的文章</p></div>';
        if (currentResults.length > 0) { currentIdx = 0; showPreview(0); }
        else { currentIdx = -1; right.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>未找到文章</p></div>'; }
    }, 50);
}
function showPreview(i) {
    if (i < 0 || i >= currentResults.length) return;
    currentIdx = i;
    var a = currentResults[i];
    var content = a.content;
    
    // 高亮关键词
    var kw = document.getElementById('q').value.trim().toLowerCase();
    if (kw) {
        var escapedKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        content = content.replace(new RegExp('(' + escapedKw + ')', 'gi'), '<span class="highlight">$1</span>');
    }
    
    // 更新左侧选中状态
    var items = document.querySelectorAll('.result-item');
    for (var j = 0; j < items.length; j++) items[j].className = items[j].className.replace(' active', '');
    if (items[i]) items[i].className += ' active';
    document.getElementById('right').innerHTML =
        '<div style="padding:8px">' +
        '<h1 style="font-size:1.6em;color:#3A6351;border-left:5px solid #7A8B7B;padding-left:12px;margin-bottom:8px;font-weight:normal">' + hl(a.title, kw) + '</h1>' +
        '<div style="font-size:0.9em;color:#7A8B7B;display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">' +
        '<span>#' + a.id + '</span><span>分类：' + a.category + '</span><span>日期：' + a.date + '</span></div>' +
        '<div style="font-size:17px;line-height:1.9">' + content + '</div>' +
        '<div style="margin-top:12px;padding-top:8px;border-top:1px solid #E8EDEA;display:flex;justify-content:space-between;font-size:0.9em;color:#7A8B7B">' +
        '<a href="#" style="color:' + (i > 0 ? '#3A6351' : '#C7D8D2') + ';text-decoration:none" ' + (i > 0 ? 'onclick="event.preventDefault();showPreview(' + (i-1) + ')"' : '') + '>← 上一篇</a>' +
        '<span>' + (i+1) + ' / ' + currentResults.length + '</span>' +
        '<a href="#" style="color:' + (i < currentResults.length-1 ? '#3A6351' : '#C7D8D2') + ';text-decoration:none" ' + (i < currentResults.length-1 ? 'onclick="event.preventDefault();showPreview(' + (i+1) + ')"' : '') + '>下一篇 →</a>' +
        '</div></div>';
    document.getElementById('right').scrollTop = 0;
}
function hl(text, kw) {
    if (!kw || !text) return text;
    var escapedKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp('(' + escapedKw + ')', 'gi'), '<span class="highlight">$1</span>');
}
function getSnippet(text, kw) {
    if (!kw) return (text || '').substring(0, 80);
    var idx = (text || '').toLowerCase().indexOf(kw);
    if (idx < 0) return (text || '').substring(0, 80);
    var start = Math.max(0, idx - 15);
    var end = Math.min(text.length, idx + kw.length + 30);
    var s = text.substring(start, end);
    if (start > 0) s = '...' + s;
    if (end < text.length) s += '...';
    return hl(s, kw);
}
</script>
</body>
</html>
