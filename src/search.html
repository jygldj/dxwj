<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="道玄文集 - 全文搜索">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'  viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>全文搜索 - 道玄文集</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "楷体", "宋体", serif;
            background: #FFFEFC;
            color: #5A4A3F;
            min-height: 100vh;
            padding: 16px;
            line-height: 1.8;
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: rgba(255, 254, 252, 0.95);
            border-radius: 12px; padding: 24px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #D1D9D9;
            min-height: calc(100vh - 32px);
            display: flex; flex-direction: column;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; border-bottom: 2px solid #D1D9D9;
            padding-bottom: 14px; margin-bottom: 16px; flex-shrink: 0;
        }
        .header h1 { font-size: 1.6em; color: #3A6351; font-weight: normal; letter-spacing: 3px; }
        .header h1 span { font-size: 0.6em; color: #7A8B7B; }
        .back-link {
            color: #3A6351; text-decoration: none; padding: 6px 16px;
            border: 1px solid #C7D8D2; border-radius: 20px; transition: all 0.3s; font-size: 0.95em;
        }
        .back-link:hover { background: #3A6351; color: white; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 12px; flex-shrink: 0; flex-wrap: wrap; }
        .search-bar input {
            flex: 1; min-width: 200px; padding: 10px 18px; border: 2px solid #D1D9D9;
            border-radius: 30px; font-family: "楷体", serif; font-size: 17px;
            background: #FFFEFC; color: #5A4A3F; outline: none; transition: border-color 0.3s;
        }
        .search-bar input:focus { border-color: #3A6351; box-shadow: 0 0 0 3px rgba(58,99,81,0.1); }
        .search-bar input::placeholder { color: #A8A59B; font-style: italic; }
        .search-bar button {
            padding: 10px 28px; background: #3A6351; color: white; border: none;
            border-radius: 30px; cursor: pointer; font-family: "楷体", serif; font-size: 17px;
            transition: all 0.3s; white-space: nowrap;
        }
        .search-bar button:hover { background: #2A5341; transform: translateY(-2px); }
        .search-stats { font-size: 0.95em; color: #7A8B7B; flex-shrink: 0; margin-bottom: 10px; }
        .search-stats strong { color: #3A6351; }
        .main-content { display: flex; flex: 1; gap: 20px; min-height: 0; }
        .left-panel { width: 35%; min-width: 250px; overflow-y: auto; padding-right: 10px; border-right: 1px solid #E8EDEA; }
        .left-panel::-webkit-scrollbar { width: 4px; }
        .left-panel::-webkit-scrollbar-thumb { background: #C7D8D2; border-radius: 4px; }
        .right-panel { flex: 1; overflow-y: auto; padding-left: 6px; }
        .right-panel::-webkit-scrollbar { width: 4px; }
        .right-panel::-webkit-scrollbar-thumb { background: #C7D8D2; border-radius: 4px; }
        .result-item {
            padding: 12px 14px; margin-bottom: 6px; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent;
            background: rgba(255,255,255,0.5);
        }
        .result-item:hover { background: #F0F5F2; border-left-color: #A8C4B8; }
        .result-item.active { background: #E8F1EC; border-left-color: #3A6351; }
        .result-item .title { font-size: 1.05em; color: #3A6351; font-weight: bold; display: block; margin-bottom: 2px; }
        .result-item .meta { font-size: 0.8em; color: #7A8B7B; display: flex; gap: 12px; flex-wrap: wrap; }
        .result-item .snippet-preview { font-size: 0.85em; color: #8A9B8B; margin-top: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .result-item .match-count { font-size: 0.75em; color: #A8A59B; margin-top: 3px; }
        .highlight { background-color: #F0E6C5; padding: 0 2px; border-radius: 2px; }
        .preview-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #A8A59B; text-align: center;
        }
        .preview-placeholder .icon { font-size: 4em; margin-bottom: 16px; opacity: 0.5; }
        .preview-article .preview-title {
            font-size: 1.8em; color: #3A6351; border-left: 5px solid #7A8B7B;
            padding-left: 15px; margin-bottom: 8px; font-weight: normal;
        }
        .preview-article .preview-meta { font-size: 0.9em; color: #7A8B7B; display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .preview-article .preview-meta span::before { content: "•"; margin-right: 6px; color: #C7D8D2; }
        .preview-article .preview-meta span:first-child::before { content: ""; margin-right: 0; }
        .preview-article .preview-body { font-size: 17px; line-height: 1.9; color: #5A4A3F; }
        .preview-article .preview-body .highlight { background-color: #F0E6C5; padding: 0 3px; border-radius: 2px; }
        .preview-article .preview-body p { margin-bottom: 0.8em; text-indent: 2em; }
        .preview-article .preview-body .annotation { color: #8b4513; font-family: "宋体", SimSun, serif; font-size: 0.9em; line-height: 1.6; border-left: 2px solid #cdaa7d; padding-left: 15px; margin: 15px 0; }
        .preview-article .preview-body .poem-title { font-weight: bold; margin: 20px 0 10px; color: #3A6351; text-align: center; }
        .preview-nav { margin-top: 16px; padding-top: 12px; border-top: 1px solid #E8EDEA; display: flex; justify-content: space-between; font-size: 0.9em; color: #7A8B7B; }
        .preview-nav a { color: #3A6351; text-decoration: none; padding: 4px 12px; border-radius: 12px; transition: background 0.2s; }
        .preview-nav a:hover { background: #E8F1EC; }
        .preview-nav a.disabled { color: #C7D8D2; pointer-events: none; }
        .empty-state { text-align: center; padding: 40px 20px; color: #7A8B7B; width: 100%; }
        .empty-state .icon { font-size: 3em; margin-bottom: 12px; opacity: 0.6; }
        .result-loading { text-align: center; padding: 30px; color: #A8A59B; }
        @media (max-width: 820px) {
            .container { padding: 16px; }
            .main-content { flex-direction: column; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid #E8EDEA; padding-bottom: 12px; max-height: 300px; }
            .right-panel { min-height: 400px; }
            .header h1 { font-size: 1.3em; }
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .container { padding: 12px; }
            .search-bar { flex-direction: column; }
            .search-bar button { width: 100%; }
            .left-panel { max-height: 200px; }
            .preview-article .preview-title { font-size: 1.4em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔍 全文搜索 <span>· 道玄文集</span></h1>
        <a href="index1.html" class="back-link">← 返回文集</a>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="输入关键词，搜索全部文章..." autofocus>
        <button onclick="doSearch()">搜索</button>
    </div>
    <div class="search-stats" id="stats" style="display:none;">
        共找到 <strong id="resultCount">0</strong> 篇相关文章
    </div>
    <div class="main-content">
        <div class="left-panel" id="leftPanel">
            <div class="empty-state">
                <div class="icon">📖</div>
                <p id="welcomeMsg">正在加载文章索引...</p>
            </div>
        </div>
        <div class="right-panel" id="rightPanel">
            <div class="preview-placeholder">
                <div class="icon">📄</div>
                <p>输入关键词搜索全部文章</p>
            </div>
        </div>
    </div>
</div>
<script>
// ============================================================
// 道玄文集 - 全文搜索
// 依赖：articles-index.json（索引）+ articles_v*.json（正文）
// ============================================================

let articlesIndex = [];       // [{id, title, category, date, volume}]
let loadedVolumes = {};       // { '1': [{id, title, content, ...}], ... }
let allArticles = [];         // 合并后的 [{id, title, category, date, content, rawText}]
let currentResults = [];
let currentKeyword = '';
let currentPreviewIndex = -1;
let searchRunning = false;

// 数据文件 URL 配置：三条链路依次尝试
const CDN_BASE = 'https://cdn.jsdelivr.net/gh/jygldj/dx@gh-pages/';
const RAW_BASE = 'https://raw.githubusercontent.com/jygldj/dx/gh-pages/';

// 带超时和自动切换的数据加载（缩短等待时间）
async function fetchData(filename) {
    const urls = [CDN_BASE + filename, RAW_BASE + filename, filename];
    let lastErr = null;
    for (let u = 0; u < urls.length; u++) {
        try {
            // 5 秒超时，避免长时间挂起
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 5000);
            const resp = await fetch(urls[u] + '?' + Date.now(), { signal: controller.signal });
            clearTimeout(timer);
            if (resp.ok) return resp;
            lastErr = new Error('HTTP ' + resp.status);
        } catch (e) {
            lastErr = e;
            // 放弃前每个 URL 只试一次（快速失败）
        }
    }
    throw lastErr;
}

// ============================================================
// 初始化：加载索引
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const resp = await fetchData('articles-index.json');
        articlesIndex = await resp.json();

        // 计算分类统计
        const stats = { '诗': 0, '词': 0, '散文': 0, '其它': 0 };
        for (const a of articlesIndex) {
            if (stats.hasOwnProperty(a.category)) stats[a.category]++;
            else stats['其它']++;
        }
        document.getElementById('welcomeMsg').innerHTML =
            '共 ' + articlesIndex.length + ' 篇文章<br>' +
            '诗 ' + stats['诗'] + ' 篇 · 词 ' + stats['词'] + ' 篇 · 散文 ' + stats['散文'] + ' 篇 · 其他 ' + stats['其它'] + ' 篇';
        // 支持从 URL 参数 ?q=xxx 直接搜索
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) {
            document.getElementById('searchInput').value = q;
            doSearch();
        }

        // 回车键触发搜索
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });
    } catch (e) {
        document.getElementById('welcomeMsg').innerHTML = '😅 文章索引打了个盹儿<br><small>请下拉刷新或检查网络后重试</small>';
    }
});

// ============================================================
// 加载所有卷数据
// ============================================================
async function loadAllVolumes() {
    const totalVolumes = Math.ceil(articlesIndex.length / 50);
    for (let v = 1; v <= totalVolumes; v++) {
        if (!loadedVolumes[v]) {
            const resp = await fetchData('articles_v' + v + '.json');
            const data = await resp.json();
            loadedVolumes[v] = data;
        }
    }
    // 合并为平铺列表
    allArticles = [];
    for (let v = 1; v <= totalVolumes; v++) {
        for (const a of (loadedVolumes[v] || [])) {
            // 提取纯文本用于搜索
            const div = document.createElement('div');
            div.innerHTML = a.content;
            a.rawText = div.textContent || '';
            allArticles.push(a);
        }
    }
}

// ============================================================
// 执行搜索
// ============================================================
async function doSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    currentKeyword = keyword;
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');

    if (!keyword) {
        leftPanel.innerHTML = '<div class="empty-state"><div class="icon">📖</div><p>输入关键词搜索全部文章</p></div>';
        rightPanel.innerHTML = '<div class="preview-placeholder"><div class="icon">📄</div><p>输入关键词搜索全部文章</p></div>';
        document.getElementById('stats').style.display = 'none';
        return;
    }

    if (searchRunning) return;
    searchRunning = true;

    // 显示加载状态
    leftPanel.innerHTML = '<div class="result-loading">🔍 正在搜索全部文章...</div>';
    document.getElementById('stats').style.display = 'none';

    try {
        if (allArticles.length === 0) {
            await loadAllVolumes();
        }

        const lowerKeyword = keyword.toLowerCase();
        currentResults = allArticles.filter(a => {
            const searchText = (a.title + ' ' + a.category + ' ' + a.date + ' ' + a.rawText).toLowerCase();
            return searchText.includes(lowerKeyword);
        });

        document.getElementById('stats').style.display = 'block';
        document.getElementById('resultCount').textContent = currentResults.length;

        renderResultList();

        if (currentResults.length > 0) {
            currentPreviewIndex = 0;
            renderPreview(0);
        } else {
            currentPreviewIndex = -1;
            rightPanel.innerHTML = '<div class="preview-placeholder"><div class="icon">🔍</div><p>未找到包含 "<strong>' + keyword + '</strong>" 的文章</p></div>';
        }

        // 更新 URL
        const url = new URL(window.location);
        url.searchParams.set('q', keyword);
        window.history.replaceState({}, '', url);

    } catch (e) {
        leftPanel.innerHTML = '<div class="empty-state"><div class="icon">😅</div><p>搜索服务打了个盹儿</p><p style="font-size:0.85em;color:#A8A59B;margin-top:6px;">请下拉刷新或换个关键词试试</p></div>';
    } finally {
        searchRunning = false;
    }
}

// ============================================================
// 渲染结果列表
// ============================================================
function renderResultList() {
    const container = document.getElementById('leftPanel');
    if (currentResults.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配文章</p></div>';
        return;
    }
    let html = '';
    currentResults.forEach((a, idx) => {
        const matchCount = countMatches(a.rawText, currentKeyword);
        const snippet = generateSnippet(a.rawText, currentKeyword);
        html += '<div class="result-item' + (idx === currentPreviewIndex ? ' active' : '') + '" onclick="selectResult(' + idx + ')">';
        html += '<span class="title">' + highlightText(a.title, currentKeyword) + '</span>';
        html += '<div class="meta"><span>#' + a.id + '</span><span>' + a.category + '</span><span>' + a.date + '</span></div>';
        html += '<div class="snippet-preview">' + snippet + '</div>';
        html += '<div class="match-count">匹配 ' + matchCount + ' 处</div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

// ============================================================
// 预览文章
// ============================================================
function renderPreview(index) {
    if (index < 0 || index >= currentResults.length) return;
    currentPreviewIndex = index;
    const a = currentResults[index];

    let content = a.content;
    if (currentKeyword) content = highlightContent(content, currentKeyword);

    document.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
    });

    document.getElementById('rightPanel').innerHTML =
        '<div class="preview-article">' +
        '<h1 class="preview-title">' + highlightText(a.title, currentKeyword) + '</h1>' +
        '<div class="preview-meta">' +
        '<span>#' + a.id + '</span><span>分类：' + a.category + '</span><span>日期：' + a.date + '</span>' +
        '</div>' +
        '<div class="preview-body">' + content + '</div>' +
        '<div class="preview-nav">' +
        '<a href="#" class="' + (index === 0 ? 'disabled' : '') + '" onclick="event.preventDefault(); if(' + index + ' > 0) selectResult(' + (index - 1) + ');">← 上一篇</a>' +
        '<span>' + (index + 1) + ' / ' + currentResults.length + '</span>' +
        '<a href="#" class="' + (index === currentResults.length - 1 ? 'disabled' : '') + '" onclick="event.preventDefault(); if(' + index + ' < ' + (currentResults.length - 1) + ') selectResult(' + (index + 1) + ');">下一篇 →</a>' +
        '</div></div>';
    document.getElementById('rightPanel').scrollTop = 0;
}

function selectResult(index) {
    if (index < 0 || index >= currentResults.length) return;
    renderPreview(index);
    const items = document.querySelectorAll('.result-item');
    if (items[index]) items[index].scrollIntoView({ block: 'nearest' });
}

// ============================================================
// 辅助函数
// ============================================================
function generateSnippet(text, keyword) {
    if (!keyword) return text.substring(0, 100) + '...';
    const lowerText = text.toLowerCase();
    const idx = lowerText.indexOf(keyword.toLowerCase());
    if (idx === -1) return highlightText(text.substring(0, 100), keyword);
    const start = Math.max(0, idx - 20);
    const end = Math.min(text.length, idx + keyword.length + 40);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet += '...';
    return highlightText(snippet, keyword);
}

function highlightText(text, keyword) {
    if (!keyword || !text) return text;
    const regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
}

function highlightContent(html, keyword) {
    if (!keyword || !html) return html;
    const regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return html.replace(regex, '<span class="highlight">$1</span>');
}

function countMatches(text, keyword) {
    if (!keyword || !text) return 0;
    const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    const m = text.match(regex);
    return m ? m.length : 0;
}
</script>
</body>
</html>
