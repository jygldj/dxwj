<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全文搜索 - 道玄文集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"楷体","宋体",serif;background:#FFFEFC;color:#5A4A3F;padding:12px;line-height:1.8}
.container{max-width:1400px;margin:0 auto;background:#FFFEFC;border-radius:12px;padding:16px;border:1px solid #D1D9D9;min-height:calc(100vh - 24px);display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:2px solid #D1D9D9;margin-bottom:12px}
.header h1{font-size:1.5em;color:#3A6351;font-weight:normal;letter-spacing:2px}
.header h1 span{font-size:0.6em;color:#7A8B7B}
.back-link{color:#3A6351;padding:4px 12px;border:1px solid #C7D8D2;border-radius:20px;text-decoration:none;font-size:0.9em}
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-bar input{flex:1;padding:8px 14px;border:2px solid #D1D9D9;border-radius:30px;font-family:"楷体",serif;font-size:16px;outline:none}
.search-bar input:focus{border-color:#3A6351}
.search-bar button{padding:8px 20px;background:#3A6351;color:#fff;border:none;border-radius:30px;cursor:pointer;font-family:"楷体",serif;font-size:16px}
#stats{font-size:0.9em;color:#7A8B7B;margin-bottom:8px;display:none}
.main-panels{display:flex;flex:1;gap:12px;min-height:0}
.left-panel{width:35%;min-width:200px;overflow-y:auto;padding-right:8px;border-right:1px solid #E8EDEA}
.right-panel{flex:1;overflow-y:auto;padding-left:4px}
.result-item{padding:10px;margin-bottom:4px;border-radius:6px;cursor:pointer;border-left:3px solid transparent;background:rgba(255,255,255,0.5)}
.result-item:hover,.result-item.active{background:#E8F1EC;border-left-color:#3A6351}
.result-item .t{color:#3A6351;font-weight:bold;display:block}
.result-item .m{font-size:0.8em;color:#7A8B7B;display:flex;gap:10px}
.result-item .s{font-size:0.85em;color:#8A9B8B;margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.result-item .c{font-size:0.75em;color:#A8A59B;margin-top:2px}
.highlight{background:#F0E6C5;padding:0 2px;border-radius:2px}
.loading{text-align:center;padding:30px;color:#A8A59B}
.empty{text-align:center;padding:30px;color:#7A8B7B;width:100%}
.empty .icon{font-size:3em;margin-bottom:8px;opacity:0.5}
@media(max-width:820px){
.main-panels{flex-direction:column}
.left-panel{width:100%;border-right:none;border-bottom:1px solid #E8EDEA;padding-bottom:8px;max-height:250px}
.right-panel{min-height:350px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔍 全文搜索 <span>· 道玄文集</span></h1>
<a href="index1.html" class="back-link">← 返回</a>
</div>
<div class="search-bar">
<input type="text" id="q" placeholder="输入关键词搜索全部文章..." autofocus>
<button onclick="doSearch()">搜索</button>
</div>
<div id="stats">共找到 <strong id="count">0</strong> 篇相关文章</div>
<div class="main-panels">
<div class="left-panel" id="left"><div class="loading" id="msg">📖 正在加载文章索引...</div></div>
<div class="right-panel" id="right"><div class="empty"><div class="icon">📄</div><p>输入关键词搜索文章</p></div></div>
</div></div>

<script>
// ============================================================
// 全文搜索 - 内嵌版 (整合所有逻辑，减少外部依赖)
// ============================================================

// ---------- 全局变量 ----------
let articles = [];
let currentResults = [];
let currentKeyword = '';
let currentPreviewIndex = -1;

// ---------- 解析函数 (从 articles1.js 中提取数据) ----------
function parseArticlesFromTxt(text) {
    // 移除 JavaScript 包装
    let clean = text.replace(/^const\s+articlesData\s*=\s*`/, '').replace(/`\s*;?\s*$/, '');
    // 按分隔符分割文章
    const separator = /[─═━─=※§]{4,}|\n{2,}[*#]{3,}\n{2,}/;
    const docs = clean.split(separator);
    const results = [];
    let id = 1;
    for (const doc of docs) {
        const trimmed = doc.trim();
        if (!trimmed) continue;
        const parsed = parseSingle(trimmed, id++);
        if (parsed) results.push(parsed);
    }
    return results;
}

function parseSingle(text, id) {
    const lines = text.split('\n');
    if (lines.length < 2) return null;
    let title = lines[0].trim().replace(/^[《\s]+|[》\s]+$/g, '');
    const meta = lines[1].trim();
    let category = '其它', date = '未标注';
    // 尝试解析 "分类｜日期" 或 "分类|日期"
    const match = meta.match(/^([^｜|]+)[｜|]\s*(.*)$/);
    if (match) {
        const raw = match[1].trim();
        if (/诗|绝|律/.test(raw)) category = '诗';
        else if (/词|令|引/.test(raw)) category = '词';
        else if (/散文|赋|记/.test(raw)) category = '散文';
        else category = raw;
        date = match[2].trim() || '未标注';
    }
    // 提取正文 (从第3行开始，直到遇到注释标记)
    let contentLines = [], notes = [], inNotes = false;
    for (let i = 2; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();
        if (!inNotes && /^(注|注释|附|附记|附注)[：:]/.test(trimmed)) {
            inNotes = true;
            const noteContent = line.replace(/^(注|注释|附|附记|附注)[：:]/, '').trim();
            if (noteContent) notes.push(noteContent);
            continue;
        }
        if (inNotes) {
            if (trimmed) notes.push(trimmed);
        } else {
            contentLines.push(line);
        }
    }
    // 构建HTML内容 (保留段落)
    let content = contentLines.join('\n').replace(/\n/g, '<br>');
    const paragraphs = content.split(/<br>\s*<br>/);
    if (paragraphs.length > 1) {
        content = paragraphs.map(p => '<p>' + p.trim() + '</p>').join('');
    } else {
        content = '<p>' + content + '</p>';
    }
    if (notes.length > 0) {
        content += `<p>注：</p><p>${notes.join(' ')}</p>`;
    }
    return {
        id, title, category, date,
        content: content,
        raw: contentLines.join('\n') // 纯文本用于搜索
    };
}

// ---------- 加载数据 ----------
async function loadData() {
    const left = document.getElementById('left');
    try {
        // 尝试从上级目录加载 articles1.js (根据实际部署路径调整)
        const resp = await fetch('../articles1.js?t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        let text = await resp.text();
        // 去除BOM
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        articles = parseArticlesFromTxt(text);
        console.log('✅ 已加载', articles.length, '篇文章');
        left.innerHTML = `<div class="empty"><div class="icon">📖</div><p>共 ${articles.length} 篇文章，输入关键词搜索</p></div>`;
        // 如果URL有?q=关键词，自动搜索
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) {
            document.getElementById('q').value = q;
            doSearch();
        }
    } catch (e) {
        console.warn('加载失败，尝试从当前目录加载...', e);
        try {
            // 如果上级目录没有，尝试当前目录
            const resp = await fetch('articles1.js?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            let text = await resp.text();
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
            articles = parseArticlesFromTxt(text);
            console.log('✅ 已从当前目录加载', articles.length, '篇文章');
            left.innerHTML = `<div class="empty"><div class="icon">📖</div><p>共 ${articles.length} 篇文章，输入关键词搜索</p></div>`;
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById('q').value = q;
                doSearch();
            }
        } catch (e2) {
            console.error('加载失败:', e2);
            left.innerHTML = `<div class="empty" style="color:#c0392b;"><div class="icon">⚠️</div><p>数据加载失败，请检查网络或 articles1.js 文件是否存在</p></div>`;
        }
    }
}

// ---------- 搜索与渲染 ----------
function doSearch() {
    const keyword = document.getElementById('q').value.trim();
    currentKeyword = keyword;
    const left = document.getElementById('left');
    const right = document.getElementById('right');
    const stats = document.getElementById('stats');

    if (!keyword) {
        left.innerHTML = `<div class="empty"><div class="icon">📖</div><p>共 ${articles.length} 篇文章，输入关键词搜索</p></div>`;
        right.innerHTML = `<div class="empty"><div class="icon">📄</div><p>输入关键词搜索文章</p></div>`;
        stats.style.display = 'none';
        return;
    }

    const lower = keyword.toLowerCase();
    currentResults = articles.filter(a => 
        a.title.toLowerCase().includes(lower) ||
        a.category.toLowerCase().includes(lower) ||
        a.date.includes(keyword) ||
        a.raw.toLowerCase().includes(lower)
    );

    stats.style.display = 'block';
    document.getElementById('count').textContent = currentResults.length;

    if (currentResults.length === 0) {
        left.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>未找到包含 “${keyword}” 的文章</p></div>`;
        right.innerHTML = `<div class="empty"><div class="icon">📄</div><p>未找到匹配结果</p></div>`;
        return;
    }

    // 渲染左列表
    let html = '';
    currentResults.forEach((a, idx) => {
        const globalIdx = articles.indexOf(a) + 1;
        const snippet = getSnippet(a.raw, keyword);
        const count = countMatches(a.raw, keyword);
        html += `<div class="result-item" onclick="selectResult(${idx})">
            <span class="t">${highlight(a.title, keyword)}</span>
            <div class="m"><span>#${globalIdx}</span><span>${a.category}</span><span>${a.date}</span></div>
            <div class="s">${snippet}</div>
            <div class="c">匹配 ${count} 处</div>
        </div>`;
    });
    left.innerHTML = html;

    // 默认选中第一个
    currentPreviewIndex = 0;
    renderPreview(0);
}

function selectResult(idx) {
    if (idx < 0 || idx >= currentResults.length) return;
    currentPreviewIndex = idx;
    // 更新高亮
    document.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });
    renderPreview(idx);
}

function renderPreview(idx) {
    const a = currentResults[idx];
    const globalIdx = articles.indexOf(a) + 1;
    const right = document.getElementById('right');
    let content = a.content;
    if (currentKeyword) {
        content = highlight(content, currentKeyword);
    }
    right.innerHTML = `
        <div>
            <h2 style="border-left:5px solid #7A8B7B;padding-left:12px;color:#3A6351;font-weight:normal;">${highlight(a.title, currentKeyword)}</h2>
            <div style="font-size:0.9em;color:#7A8B7B;margin:4px 0 12px 0;">
                <span>#${globalIdx}</span> · <span>${a.category}</span> · <span>${a.date}</span>
            </div>
            <div style="font-size:17px;line-height:1.9;">${content}</div>
            <div style="margin-top:16px;padding-top:12px;border-top:1px solid #E8EDEA;display:flex;justify-content:space-between;font-size:0.9em;">
                <a href="#" ${idx===0?'style=visibility:hidden':''} onclick="event.preventDefault();selectResult(${idx-1})">← 上一篇</a>
                <span>${idx+1} / ${currentResults.length}</span>
                <a href="#" ${idx===currentResults.length-1?'style=visibility:hidden':''} onclick="event.preventDefault();selectResult(${idx+1})">下一篇 →</a>
            </div>
        </div>
    `;
    right.scrollTop = 0;
}

// ---------- 辅助函数 ----------
function highlight(text, keyword) {
    if (!keyword || !text) return text;
    const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
}

function getSnippet(text, keyword) {
    const lower = text.toLowerCase();
    const kw = keyword.toLowerCase();
    const idx = lower.indexOf(kw);
    if (idx === -1) return highlight(text.substring(0, 120) + '...', keyword);
    const start = Math.max(0, idx - 20);
    const end = Math.min(text.length, idx + kw.length + 40);
    let s = text.substring(start, end);
    if (start > 0) s = '...' + s;
    if (end < text.length) s = s + '...';
    return highlight(s, keyword);
}

function countMatches(text, keyword) {
    if (!keyword) return 0;
    const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    const m = text.match(regex);
    return m ? m.length : 0;
}

// ---------- 初始化 ----------
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    document.getElementById('q').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
    });
    // 自动聚焦
    setTimeout(() => document.getElementById('q').focus(), 300);
});
</script>

</body>
</html>
